name: Frontend Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/bioeq-ai-frontend

jobs:
  frontend_quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend type check
        run: npm run lint

      - name: Build frontend
        run: npm run build

  frontend_build:
    needs: frontend_quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  frontend_deploy:
    needs: frontend_build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy frontend on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          FRONTEND_IMAGE_TAG: ${{ github.sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          envs: FRONTEND_IMAGE,FRONTEND_IMAGE_TAG,DEPLOY_PATH,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -eu
            if [ -z "${DEPLOY_PATH:-}" ]; then
              echo "DEPLOY_PATH is not set"
              exit 1
            fi

            CANDIDATE_PATHS="$DEPLOY_PATH $HOME/bioeq_ai"
            WORKDIR=""
            for path in $CANDIDATE_PATHS; do
              if [ -d "$path" ] && { [ -f "$path/docker-compose.yml" ] || [ -f "$path/docker-compose.yaml" ]; }; then
                WORKDIR="$path"
                break
              fi
            done

            if [ -z "$WORKDIR" ]; then
              echo "Could not find docker compose files in any candidate path:"
              for path in $CANDIDATE_PATHS; do
                echo " - $path"
                if [ -d "$path" ]; then
                  ls -la "$path"
                else
                  echo "   (directory does not exist)"
                fi
              done
              exit 1
            fi

            cd "$WORKDIR"
            echo "Using deploy directory: $WORKDIR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Neither 'docker compose' nor 'docker-compose' is available on server"
              exit 1
            fi

            if [ -f docker-compose.yml ]; then
              BASE_COMPOSE_FILE="docker-compose.yml"
            elif [ -f docker-compose.yaml ]; then
              BASE_COMPOSE_FILE="docker-compose.yaml"
            else
              echo "Base docker compose file not found in $WORKDIR"
              ls -la
              exit 1
            fi

            if [ -f docker-compose.prod.yml ]; then
              PROD_COMPOSE_FILE="docker-compose.prod.yml"
            elif [ -f docker-compose.prod.yaml ]; then
              PROD_COMPOSE_FILE="docker-compose.prod.yaml"
            else
              echo "Production docker compose file not found in $WORKDIR"
              ls -la
              exit 1
            fi

            FRONTEND_IMAGE="$FRONTEND_IMAGE:$FRONTEND_IMAGE_TAG" sh -c "$COMPOSE_CMD -f $BASE_COMPOSE_FILE -f $PROD_COMPOSE_FILE pull frontend"
            docker ps -aq --filter "name=bioeq-ai-frontend" | xargs -r docker rm -f >/dev/null 2>&1 || true
            FRONTEND_IMAGE="$FRONTEND_IMAGE:$FRONTEND_IMAGE_TAG" sh -c "$COMPOSE_CMD -f $BASE_COMPOSE_FILE -f $PROD_COMPOSE_FILE up -d --remove-orphans --no-build --no-deps frontend nginx"

            frontend_ready=0
            for i in $(seq 1 60); do
              status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' bioeq-ai-frontend 2>/dev/null || true)"
              if [ "$status" = "healthy" ]; then
                frontend_ready=1
                break
              fi
              sleep 2
            done

            if [ "$frontend_ready" -ne 1 ]; then
              echo "Frontend deploy health check failed on server"
              FRONTEND_IMAGE="$FRONTEND_IMAGE:$FRONTEND_IMAGE_TAG" sh -c "$COMPOSE_CMD -f $BASE_COMPOSE_FILE -f $PROD_COMPOSE_FILE ps"
              docker logs --tail 100 bioeq-ai-frontend || true
              exit 1
            fi

            wait_container_ready() {
              name="$1"
              timeout_seconds="${2:-120}"
              last_state="unknown"
              last_health="unknown"

              for _ in $(seq 1 "$timeout_seconds"); do
                last_state="$(docker inspect -f '{{.State.Status}}' "$name" 2>/dev/null || echo missing)"
                last_health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$name" 2>/dev/null || echo unknown)"

                if [ "$last_state" = "running" ] && { [ "$last_health" = "healthy" ] || [ "$last_health" = "none" ]; }; then
                  echo "Container $name is OK (state=$last_state, health=$last_health)"
                  return 0
                fi

                if [ "$last_state" = "exited" ] || [ "$last_state" = "dead" ] || [ "$last_health" = "unhealthy" ]; then
                  echo "Container $name is not ready (state=$last_state, health=$last_health)"
                  return 1
                fi

                sleep 2
              done

              echo "Container $name readiness timeout (state=$last_state, health=$last_health)"
              return 1
            }

            check_failed=0
            for container in bioeq-ai-frontend bioeq-ai-nginx bioeq-ai-app; do
              if ! wait_container_ready "$container" 120; then
                check_failed=1
              fi
            done

            if [ "$check_failed" -ne 0 ]; then
              echo "Post-deploy container verification failed"
              FRONTEND_IMAGE="$FRONTEND_IMAGE:$FRONTEND_IMAGE_TAG" sh -c "$COMPOSE_CMD -f $BASE_COMPOSE_FILE -f $PROD_COMPOSE_FILE ps"
              for container in bioeq-ai-frontend bioeq-ai-nginx bioeq-ai-app; do
                docker logs --tail 100 "$container" || true
              done
              exit 1
            fi
